<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sign In — DUBIMOTORS</title>
<meta name="robots" content="noindex,nofollow" />
<style>
  body { background: #111; color: #fff; font-family: system-ui, sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
  .wrap { text-align: center; padding: 40px; }
  .spinner { width: 36px; height: 36px; border: 3px solid #333; border-top-color: #E8450A; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  a { color: #E8450A; text-decoration: none; font-weight: 700; }
</style>
<!-- Redirect old login.html links to home and trigger the auth modal. The
     standalone login page is gone — sign-in lives in the in-page modal. -->
<script>
  (function () {
    var params = new URLSearchParams(window.location.search);
    var next = params.get('next') || '/';
    // Preserve `next` in the hash so the auth modal can redirect after sign-in
    var hash = '#signin';
    if (next && next !== '/') hash += '=' + encodeURIComponent(next);
    // Use replace so the user doesn't end up with login.html in history
    window.location.replace('/' + hash);
  })();
</script>
</head>
<body>
  <div class="wrap">
    <div class="spinner"></div>
    <div>Redirecting to sign-in&hellip;</div>
    <div style="margin-top:12px;font-size:13px;color:#888;">
      If you're not redirected, <a href="/">click here</a>.
    </div>
  </div>
</body>
</html>
