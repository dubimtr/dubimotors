<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Verify Email — DubiMotors</title>
  <meta name="description" content="Confirming your DubiMotors email address." />
  <meta name="robots" content="noindex" />
  <link rel="icon" type="image/png" href="dm-icon.png" />
  <link rel="stylesheet" href="style.css" />
  <style>
    .verify-card {
      max-width: 480px;
      margin: 80px auto;
      background: #fff;
      border-radius: 16px;
      padding: 48px 40px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.06);
      text-align: center;
    }
    .verify-icon {
      font-size: 56px;
      margin-bottom: 18px;
    }
    .verify-title {
      font-size: 24px;
      font-weight: 900;
      color: var(--dark);
      margin-bottom: 12px;
      line-height: 1.3;
    }
    .verify-msg {
      font-size: 15px;
      color: var(--grey);
      line-height: 1.65;
      margin-bottom: 28px;
    }
    .verify-btn {
      display: inline-block;
      background: var(--orange);
      color: #fff;
      font-size: 15px;
      font-weight: 700;
      padding: 14px 28px;
      border-radius: 10px;
      text-decoration: none;
      border: none;
      cursor: pointer;
      transition: background 0.15s;
    }
    .verify-btn:hover { background: var(--orange-hover); }
    .verify-spinner {
      display: inline-block;
      width: 28px;
      height: 28px;
      border: 3px solid rgba(232, 69, 10, 0.2);
      border-top-color: var(--orange);
      border-radius: 50%;
      animation: dm-spin 0.8s linear infinite;
      margin-bottom: 18px;
    }
    @keyframes dm-spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="navbar-placeholder"></div>

  <main>
    <div class="verify-card" id="verify-card">
      <div class="verify-spinner"></div>
      <div class="verify-title">Verifying your email&hellip;</div>
      <div class="verify-msg">This will only take a moment.</div>
    </div>
  </main>

  <div id="footer-placeholder"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.4/dist/umd/supabase.min.js" defer></script>
  <script src="supabase-client.js" defer></script>
  <script src="auth.js" defer></script>
  <script src="components.js"></script>
  <script src="auth-modal.js" defer></script>
  <script>
    renderNavbar('');
    renderFooter();

    function showResult({ icon, title, message, ctaLabel, ctaHref }) {
      const card = document.getElementById('verify-card');
      card.innerHTML = `
        <div class="verify-icon">${icon}</div>
        <div class="verify-title">${title}</div>
        <div class="verify-msg">${message}</div>
        ${ctaLabel ? `<a class="verify-btn" href="${ctaHref}">${ctaLabel}</a>` : ''}
      `;
    }

    (async () => {
      const params = new URLSearchParams(window.location.search);
      const token = params.get('token');
      if (!token) {
        showResult({
          icon: '⚠️',
          title: 'Missing verification token',
          message: 'This link is incomplete. Please use the link from your email.',
          ctaLabel: 'Back to Home', ctaHref: 'index.html',
        });
        return;
      }

      try {
        const res = await fetch('/api/verify-email?token=' + encodeURIComponent(token));
        const data = await res.json();

        if (data.ok) {
          // Refresh the local profile cache so other pages see the verified state immediately
          if (window.Auth && typeof window.Auth.clearProfileCache === 'function') {
            window.Auth.clearProfileCache();
          }
          showResult({
            icon: '✅',
            title: 'Email verified!',
            message: 'Thanks for confirming your email. You can now publish listings and contact sellers.',
            ctaLabel: 'Go to my profile', ctaHref: 'profile.html',
          });
          return;
        }

        // Error
        showResult({
          icon: '⚠️',
          title: 'Verification failed',
          message: data.error || 'This link could not be verified. It may have expired or already been used.',
          ctaLabel: 'Back to Home', ctaHref: 'index.html',
        });
      } catch (e) {
        showResult({
          icon: '⚠️',
          title: 'Could not connect',
          message: 'We could not reach our verification service. Please check your connection and try again.',
          ctaLabel: 'Back to Home', ctaHref: 'index.html',
        });
      }
    })();
  </script>
</body>
</html>
