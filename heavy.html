<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Heavy Vehicles for Sale in UAE — DUBIMOTORS</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .page-hero { background: var(--dark); padding: 32px 0 28px; }
    .page-hero .container { display: flex; align-items: center; justify-content: space-between; gap: 24px; }
    .page-hero-title { font-size: 30px; font-weight: 900; color: var(--white); margin-bottom: 4px; }
    .page-hero-sub { font-size: 14px; color: #666; }
    .breadcrumb { display: flex; align-items: center; gap: 8px; font-size: 12px; color: #555; margin-bottom: 10px; }
    .breadcrumb a { color: #555; } .breadcrumb a:hover { color: var(--orange); }
    .type-strip { background: var(--white); border-bottom: 1px solid var(--border); padding: 12px 0; overflow: hidden; }
    .type-strip-inner { display: flex; align-items: center; gap: 8px; overflow-x: auto; scrollbar-width: none; padding: 0 4px; }
    .type-strip-inner::-webkit-scrollbar { display: none; }
    .type-btn { padding: 8px 18px; border: 1.5px solid var(--border); border-radius: 20px; font-size: 13px; font-weight: 600; color: #555; background: var(--white); cursor: pointer; white-space: nowrap; flex-shrink: 0; transition: all 0.2s; }
    .type-btn:hover, .type-btn.active { border-color: var(--orange); background: #FFF8F6; color: var(--orange); }
    .filter-bar { background: #F7F7F7; border-bottom: 1px solid var(--border); padding: 12px 0; }
    .filter-bar .container { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .filter-select { padding: 9px 14px; border: 1.5px solid var(--border); border-radius: 8px; font-size: 13px; font-family: 'Inter',sans-serif; color: var(--dark); background: var(--white); cursor: pointer; }
    .filter-select:focus { outline: none; border-color: var(--orange); }
    .filter-count { margin-left: auto; font-size: 13px; color: #888; font-weight: 600; }
    .results-section { padding: 32px 0; background: var(--light); min-height: 60vh; }
    .results-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
    .results-title { font-size: 18px; font-weight: 800; color: var(--dark); }
    .listings-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; }
    @media (max-width: 1100px) { .listings-grid { grid-template-columns: repeat(3, 1fr); } }
    @media (max-width: 768px) { .listings-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; } }
    @media (max-width: 480px) { .listings-grid { grid-template-columns: 1fr; } }
    .no-results { text-align: center; padding: 80px 20px; color: #888; }
    .no-results-icon { font-size: 48px; margin-bottom: 16px; }
    .no-results-title { font-size: 20px; font-weight: 800; color: var(--dark); margin-bottom: 8px; }
    .pagination { display: flex; gap: 8px; justify-content: center; margin-top: 32px; }
    .page-btn { padding: 8px 16px; border: 1.5px solid var(--border); border-radius: 8px; font-size: 14px; font-weight: 600; background: var(--white); cursor: pointer; }
    .page-btn.active { background: var(--orange); color: var(--white); border-color: var(--orange); }
    @media (max-width: 768px) { .page-hero .container { flex-direction: column; align-items: flex-start; } }
  </style>
</head>
<body>
<div id="navbar-placeholder"></div>

<div class="page-hero">
  <div class="container">
    <div>
      <div class="breadcrumb"><a href="index.html">Home</a><span>›</span><span>Heavy Vehicles</span></div>
      <div class="page-hero-title">Heavy Vehicles for Sale in UAE</div>
      <div class="page-hero-sub" id="hero-count">Trucks, Buses, Construction Equipment &amp; More</div>
    </div>
    <a class="btn-orange" href="place-ad.html?cat=heavy" style="white-space:nowrap;flex-shrink:0;padding:12px 24px;border-radius:10px;font-weight:700;font-size:14px;background:var(--orange);color:#fff;text-decoration:none;">+ List Your Vehicle</a>
  </div>
</div>

<div class="type-strip">
  <div class="container">
    <div class="type-strip-inner">
      <button class="type-btn active" onclick="filterType(this,'')">All Types</button>
      <button class="type-btn" onclick="filterType(this,'Truck')">Trucks</button>
      <button class="type-btn" onclick="filterType(this,'Tipper')">Tippers</button>
      <button class="type-btn" onclick="filterType(this,'Tanker')">Tankers</button>
      <button class="type-btn" onclick="filterType(this,'Bus')">Buses</button>
      <button class="type-btn" onclick="filterType(this,'Van')">Vans &amp; Pickups</button>
      <button class="type-btn" onclick="filterType(this,'Excavator')">Excavators</button>
      <button class="type-btn" onclick="filterType(this,'Forklift')">Forklifts</button>
      <button class="type-btn" onclick="filterType(this,'Crane')">Cranes</button>
    </div>
  </div>
</div>

<div class="filter-bar">
  <div class="container">
    <select class="filter-select" id="filterCity" onchange="applyFilters()">
      <option value="">All Emirates</option>
      <option>Dubai</option><option>Abu Dhabi</option><option>Sharjah</option>
      <option>Ajman</option><option>Ras Al Khaimah</option><option>Fujairah</option><option>Umm Al Quwain</option>
    </select>
    <select class="filter-select" id="filterMake" onchange="applyFilters()">
      <option value="">All Makes</option>
      <option>Mercedes-Benz</option><option>Volvo</option><option>MAN</option><option>Scania</option>
      <option>DAF</option><option>Iveco</option><option>Renault</option><option>Hino</option>
      <option>Mitsubishi Fuso</option><option>Isuzu</option><option>Toyota</option><option>Ford</option>
      <option>Caterpillar</option><option>Komatsu</option><option>JCB</option>
    </select>
    <select class="filter-select" id="filterCondition" onchange="applyFilters()">
      <option value="">Any Condition</option>
      <option>Brand New</option><option>Used</option>
    </select>
    <select class="filter-select" id="filterSort" onchange="applyFilters()">
      <option value="newest">Newest First</option>
      <option value="price-asc">Price: Low to High</option>
      <option value="price-desc">Price: High to Low</option>
    </select>
    <span class="filter-count" id="filter-count">Loading...</span>
  </div>
</div>

<section class="results-section">
  <div class="container">
    <div class="results-header">
      <div class="results-title" id="results-title">Loading...</div>
    </div>
    <div class="listings-grid" id="results-grid"></div>
    <div class="no-results" id="no-results" style="display:none;">
      <div class="no-results-icon">🚛</div>
      <div class="no-results-title">No heavy vehicles found</div>
      <p>Try adjusting your filters or <a href="place-ad.html?cat=heavy" style="color:var(--orange)">be the first to list one</a>.</p>
    </div>
    <div class="pagination" id="pagination"></div>
  </div>
</section>

<div id="footer-placeholder"></div>
<div id="toast" class="toast"></div>
<script src="shared.js"></script>
<script src="vehicles.js"></script>
<script src="components.js"></script>
<script>
  renderNavbar('heavy');
  renderFooter();

  const PER_PAGE = 12;
  let allListings = [], filtered = [], currentPage = 1, activeType = '';

  const heavyData = [
    { make:'Mercedes-Benz', model:'Actros 2545', year:2022, price:320000, type:'Truck', km:85000, city:'Dubai', cond:'Used', seller:'Al Futtaim Trucks', verified:true },
    { make:'Volvo', model:'FH16 750', year:2023, price:480000, type:'Truck', km:12000, city:'Abu Dhabi', cond:'Used', seller:'Emirates Heavy Equipment', verified:true },
    { make:'MAN', model:'TGX 26.440', year:2021, price:265000, type:'Truck', km:120000, city:'Sharjah', cond:'Used', seller:'Private Seller', verified:false },
    { make:'Scania', model:'R500 6x4', year:2022, price:390000, type:'Tipper', km:65000, city:'Dubai', cond:'Used', seller:'Gulf Trucks LLC', verified:true },
    { make:'Hino', model:'500 Series', year:2023, price:195000, type:'Truck', km:8000, city:'Ajman', cond:'Used', seller:'Hino UAE Dealer', verified:true },
    { make:'Isuzu', model:'FVR 34L', year:2021, price:145000, type:'Van', km:95000, city:'Dubai', cond:'Used', seller:'Private Seller', verified:false },
    { make:'Mercedes-Benz', model:'Arocs 3240', year:2020, price:285000, type:'Tipper', km:145000, city:'Ras Al Khaimah', cond:'Used', seller:'RAK Heavy Vehicles', verified:false },
    { make:'Volvo', model:'FM 420', year:2023, price:355000, type:'Tanker', km:5000, city:'Abu Dhabi', cond:'Brand New', seller:'Volvo Trucks UAE', verified:true },
    { make:'MAN', model:'TGS 18.400', year:2022, price:230000, type:'Bus', km:78000, city:'Dubai', cond:'Used', seller:'Emirates Bus Trading', verified:true },
    { make:'Caterpillar', model:'320 GC Excavator', year:2021, price:520000, type:'Excavator', km:0, city:'Dubai', cond:'Used', seller:'CAT Dealer UAE', verified:true },
    { make:'JCB', model:'3CX Backhoe Loader', year:2022, price:280000, type:'Excavator', km:0, city:'Sharjah', cond:'Used', seller:'JCB UAE', verified:true },
    { make:'Toyota', model:'Land Cruiser Pickup 79', year:2024, price:185000, type:'Van', km:0, city:'Dubai', cond:'Brand New', seller:'Al Futtaim Toyota', verified:true },
    { make:'Mitsubishi Fuso', model:'Super Great V', year:2022, price:310000, type:'Truck', km:55000, city:'Abu Dhabi', cond:'Used', seller:'Mitsubishi Fuso UAE', verified:true },
    { make:'Scania', model:'S730 8x4', year:2023, price:620000, type:'Truck', km:3000, city:'Dubai', cond:'Brand New', seller:'Scania UAE', verified:true },
    { make:'Komatsu', model:'PC200-8M0', year:2020, price:445000, type:'Excavator', km:0, city:'Abu Dhabi', cond:'Used', seller:'Komatsu UAE', verified:false },
    { make:'Iveco', model:'Stralis 460', year:2021, price:198000, type:'Truck', km:110000, city:'Fujairah', cond:'Used', seller:'Private Seller', verified:false },
  ];

  const imgs = [
    'cat-heavy-new.jpg',
    'https://images.unsplash.com/photo-1558618666-fcd25c85cd64?w=600&q=80',
    'https://images.unsplash.com/photo-1601584115197-04ecc0da31d7?w=600&q=80',
    'https://images.unsplash.com/photo-1519003722824-194d4455a60c?w=600&q=80',
  ];

  allListings = heavyData.map((d, i) => ({ ...d, id: 'hv' + i, img: imgs[i % imgs.length], location: d.city, condition: d.cond, title: `${d.year} ${d.make} ${d.model}` }));

  function filterType(btn, type) {
    document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeType = type;
    applyFilters();
  }

  function applyFilters() {
    const city = document.getElementById('filterCity').value;
    const make = document.getElementById('filterMake').value;
    const cond = document.getElementById('filterCondition').value;
    const sort = document.getElementById('filterSort').value;
    filtered = allListings.filter(l => {
      if (city && l.location !== city) return false;
      if (make && l.make !== make) return false;
      if (cond && l.condition !== cond) return false;
      if (activeType && l.type !== activeType) return false;
      return true;
    });
    if (sort === 'price-asc') filtered.sort((a,b) => a.price - b.price);
    else if (sort === 'price-desc') filtered.sort((a,b) => b.price - a.price);
    currentPage = 1;
    renderPage();
  }

  function renderPage() {
    const grid = document.getElementById('results-grid');
    const noRes = document.getElementById('no-results');
    const start = (currentPage - 1) * PER_PAGE;
    const page = filtered.slice(start, start + PER_PAGE);
    const count = filtered.length;
    document.getElementById('filter-count').textContent = count + ' listing' + (count !== 1 ? 's' : '');
    document.getElementById('results-title').textContent = count + ' heavy vehicle' + (count !== 1 ? 's' : '') + ' found';
    document.getElementById('hero-count').textContent = count + ' heavy vehicles listed across the UAE';
    if (count === 0) { grid.innerHTML = ''; noRes.style.display = 'block'; }
    else {
      noRes.style.display = 'none';
      grid.innerHTML = page.map(l => `
        <div class="listing-card" onclick="window.location.href='listing.html?id=${l.id}'">
          <div class="card-img-wrap">
            <img src="${l.img}" alt="${l.title}" loading="lazy" onerror="this.src='cat-heavy-new.jpg'" />
            <span class="card-badge ${l.condition === 'Brand New' ? 'badge-new' : 'badge-used'}">${l.condition}</span>
            ${l.verified ? '<span class="card-verified">&#10003; Verified</span>' : ''}
          </div>
          <div class="card-body">
            <div class="card-price">${DM.formatPrice(l.price)}</div>
            <div class="card-title">${l.title}</div>
            <div class="card-pills">
              <span class="pill">${l.year}</span>
              <span class="pill">${l.type}</span>
              ${l.km > 0 ? `<span class="pill">${l.km.toLocaleString()} KM</span>` : '<span class="pill">0 KM</span>'}
            </div>
            <div class="card-location">&#128205; ${l.location}</div>
          </div>
          <div class="card-footer">
            <div class="card-seller">${l.seller}</div>
            <button class="btn-sm-orange" onclick="event.stopPropagation();window.location.href='listing.html?id=${l.id}'">Details</button>
          </div>
        </div>`).join('');
    }
    const totalPages = Math.ceil(count / PER_PAGE);
    const pag = document.getElementById('pagination');
    pag.innerHTML = '';
    if (totalPages > 1) {
      for (let i = 1; i <= totalPages; i++) {
        pag.innerHTML += `<button class="page-btn${i === currentPage ? ' active' : ''}" onclick="goPage(${i})">${i}</button>`;
      }
    }
  }
  function goPage(p) { currentPage = p; renderPage(); window.scrollTo({ top: 0, behavior: 'smooth' }); }
  applyFilters();
</script>
</body>
</html>
