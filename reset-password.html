<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password — DubiMotors</title>
  <meta name="description" content="Set a new password for your DubiMotors account." />
  <meta name="robots" content="noindex" />
  <link rel="icon" type="image/png" href="dm-icon.png" />
  <link rel="stylesheet" href="style.css" />
  <style>
    .reset-card {
      max-width: 460px;
      margin: 60px auto;
      background: #fff;
      border-radius: 16px;
      padding: 40px 36px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.06);
    }
    .reset-icon {
      font-size: 44px;
      text-align: center;
      margin-bottom: 12px;
      line-height: 1;
    }
    .reset-title {
      font-size: 22px;
      font-weight: 900;
      color: var(--dark);
      margin-bottom: 8px;
      text-align: center;
      line-height: 1.3;
    }
    .reset-msg {
      font-size: 14px;
      color: var(--grey);
      line-height: 1.6;
      margin-bottom: 22px;
      text-align: center;
    }
    .reset-form-group { margin-bottom: 14px; }
    .reset-label {
      display: block;
      font-size: 11px;
      font-weight: 700;
      color: #555;
      letter-spacing: 0.4px;
      text-transform: uppercase;
      margin-bottom: 6px;
    }
    .reset-input {
      width: 100%;
      padding: 12px 14px;
      border-radius: 10px;
      border: 1.5px solid #e5e5e5;
      font-size: 15px;
      font-family: inherit;
      box-sizing: border-box;
      transition: border-color .15s;
    }
    .reset-input:focus { outline: none; border-color: var(--orange); }
    .reset-status {
      padding: 10px 14px;
      border-radius: 10px;
      font-size: 13px;
      line-height: 1.5;
      margin-bottom: 14px;
      display: none;
      background: #FFEBEE;
      color: #C62828;
    }
    .reset-status.show { display: block; }
    .reset-status.ok { background: #E8F5E9; color: #2E7D32; }
    .reset-submit {
      width: 100%;
      background: var(--orange);
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 14px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 6px;
      transition: background 0.15s;
    }
    .reset-submit:hover:not(:disabled) { background: var(--orange-hover); }
    .reset-submit:disabled { opacity: 0.6; cursor: not-allowed; }
    .reset-back {
      display: block;
      text-align: center;
      margin-top: 16px;
      font-size: 13px;
      color: var(--grey);
    }
    .reset-back a { color: var(--orange); font-weight: 600; }
    .reset-help {
      font-size: 12px;
      color: var(--grey);
      margin-top: 6px;
      line-height: 1.45;
    }
    .reset-spinner {
      display: inline-block;
      width: 28px;
      height: 28px;
      border: 3px solid rgba(232, 69, 10, 0.2);
      border-top-color: var(--orange);
      border-radius: 50%;
      animation: dm-spin 0.8s linear infinite;
      margin-bottom: 14px;
    }
    @keyframes dm-spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="navbar-placeholder"></div>

  <main>
    <!-- ─── Initial state: form (shown if token is present) ─── -->
    <div class="reset-card" id="reset-card">
      <div class="reset-icon">🔒</div>
      <div class="reset-title">Choose a new password</div>
      <div class="reset-msg">Enter a new password for your DubiMotors account.</div>

      <div class="reset-status" id="reset-status"></div>

      <form id="reset-form" autocomplete="off">
        <div class="reset-form-group">
          <label class="reset-label" for="pw">New password</label>
          <input class="reset-input" id="pw" type="password" autocomplete="new-password" minlength="6" required />
          <div class="reset-help">At least 6 characters.</div>
        </div>
        <div class="reset-form-group">
          <label class="reset-label" for="pw2">Confirm new password</label>
          <input class="reset-input" id="pw2" type="password" autocomplete="new-password" minlength="6" required />
        </div>
        <button class="reset-submit" type="submit">Update Password</button>
      </form>

      <div class="reset-back">
        <a href="index.html">Cancel and go home</a>
      </div>
    </div>
  </main>

  <div id="footer-placeholder"></div>

  <script src="components.js"></script>
  <script>
    renderNavbar('');
    renderFooter();

    // ─── Helpers ───
    function setStatus(msg, kind) {
      const el = document.getElementById('reset-status');
      el.textContent = msg || '';
      el.className = 'reset-status' + (msg ? ' show' : '') + (kind === 'ok' ? ' ok' : '');
    }

    function showResultCard({ icon, title, message, ctaLabel, ctaHref }) {
      const card = document.getElementById('reset-card');
      card.innerHTML = `
        <div class="reset-icon">${icon}</div>
        <div class="reset-title">${title}</div>
        <div class="reset-msg">${message}</div>
        ${ctaLabel ? `<a class="reset-submit" style="display:inline-block;text-decoration:none;text-align:center;box-sizing:border-box;" href="${ctaHref}">${ctaLabel}</a>` : ''}
      `;
    }

    // ─── Read token from URL ───
    const params = new URLSearchParams(window.location.search);
    const token = params.get('token');

    if (!token) {
      // Show a friendly "missing token" state instead of the form
      showResultCard({
        icon: '⚠️',
        title: 'This reset link is incomplete',
        message: 'It looks like the link you clicked is missing a token. Please use the link from the email we sent you, or request a new password reset.',
        ctaLabel: 'Back to Home',
        ctaHref: 'index.html',
      });
    } else {
      // ─── Wire form submit ───
      document.getElementById('reset-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        setStatus('');
        const pw  = document.getElementById('pw').value;
        const pw2 = document.getElementById('pw2').value;
        if (pw.length < 6) {
          setStatus('Password must be at least 6 characters.');
          return;
        }
        if (pw !== pw2) {
          setStatus('Passwords don\'t match. Please try again.');
          return;
        }
        const btn = e.target.querySelector('.reset-submit');
        btn.disabled = true;
        btn.textContent = 'Updating…';

        try {
          const res = await fetch('/api/reset-password', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ token, password: pw }),
          });
          const data = await res.json();
          if (!data.ok) {
            btn.disabled = false;
            btn.textContent = 'Update Password';
            setStatus(data.error || 'Could not update your password. Please try again.');
            return;
          }
          // Success — show confirmation
          showResultCard({
            icon: '✅',
            title: 'Password updated',
            message: 'Your password has been changed. You can now sign in with your new password.',
            ctaLabel: 'Go to Home',
            ctaHref: 'index.html',
          });
        } catch (err) {
          btn.disabled = false;
          btn.textContent = 'Update Password';
          setStatus('Could not reach our servers. Please check your connection and try again.');
        }
      });

      // Focus the first password field
      setTimeout(() => {
        const el = document.getElementById('pw');
        if (el) el.focus();
      }, 100);
    }
  </script>
</body>
</html>
