<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Ads — DUBIMOTORS</title>
    <!-- Font preconnect + stylesheet (loaded in parallel with style.css) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" />
  <link rel="stylesheet" href="style.css" />
  <script src="user-common.js"></script>
  <style>
    body { background: var(--light-grey); }
    .dashboard-layout { display: grid; grid-template-columns: 260px 1fr; gap: 28px; padding: 36px 0 60px; }
    @media (max-width: 860px) { .dashboard-layout { grid-template-columns: 1fr; } .dash-sidebar { display: none; } }
    .dash-sidebar { display: flex; flex-direction: column; gap: 8px; }
    .dash-profile-card { background: var(--white); border-radius: 16px; padding: 24px; text-align: center; box-shadow: var(--shadow); margin-bottom: 8px; }
    .dash-avatar { width: 72px; height: 72px; border-radius: 50%; background: var(--orange); color: var(--white); font-size: 26px; font-weight: 800; display: flex; align-items: center; justify-content: center; margin: 0 auto 12px; }
    .dash-name { font-size: 16px; font-weight: 800; color: var(--dark); }
    .dash-email { font-size: 12px; color: var(--grey); margin-top: 2px; }
    .dash-verified-badge { display: inline-flex; align-items: center; gap: 4px; background: #E8F5E9; color: #2E7D32; font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 20px; margin-top: 8px; }
    .dash-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 16px; }
    .dash-stat { background: var(--light-grey); border-radius: 10px; padding: 10px; text-align: center; }
    .dash-stat-num { font-size: 20px; font-weight: 900; color: var(--dark); }
    .dash-stat-label { font-size: 10px; color: var(--grey); font-weight: 600; margin-top: 2px; }
    .dash-nav { background: var(--white); border-radius: 16px; padding: 8px; box-shadow: var(--shadow); }
    .dash-nav-item { display: flex; align-items: center; gap: 12px; padding: 12px 14px; border-radius: 10px; font-size: 14px; font-weight: 600; color: var(--dark); cursor: pointer; text-decoration: none; transition: background 0.15s; }
    .dash-nav-item:hover { background: var(--light-grey); }
    .dash-nav-item.active { background: #FFF0EB; color: var(--orange); }
    .dash-nav-item svg { width: 18px; height: 18px; flex-shrink: 0; }
    .dash-nav-badge { margin-left: auto; background: var(--orange); color: var(--white); font-size: 10px; font-weight: 800; padding: 2px 7px; border-radius: 20px; }
    .dash-main { display: flex; flex-direction: column; gap: 24px; }
    .dash-card { background: var(--white); border-radius: 16px; padding: 28px; box-shadow: var(--shadow); }
    .dash-card-title { font-size: 18px; font-weight: 800; color: var(--dark); margin-bottom: 4px; }
    .dash-card-sub { font-size: 13px; color: var(--grey); margin-bottom: 24px; }

    /* Stats bar */
    .ads-stats-bar { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
    @media (max-width: 600px) { .ads-stats-bar { grid-template-columns: 1fr 1fr; } }
    .ads-stat-card { background: var(--white); border-radius: 14px; padding: 20px; box-shadow: var(--shadow); text-align: center; }
    .ads-stat-num { font-size: 32px; font-weight: 900; color: var(--dark); }
    .ads-stat-label { font-size: 12px; color: var(--grey); font-weight: 600; margin-top: 4px; }
    .ads-stat-card.orange .ads-stat-num { color: var(--orange); }
    .ads-stat-card.blue .ads-stat-num { color: #2196F3; }
    .ads-stat-card.green .ads-stat-num { color: #4CAF50; }

    /* Filter tabs */
    .ads-filter-tabs { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
    .ads-tab { padding: 8px 18px; border-radius: 20px; font-size: 13px; font-weight: 700; border: 1.5px solid var(--border); background: var(--white); color: var(--grey); cursor: pointer; transition: all 0.15s; }
    .ads-tab.active { background: var(--orange); color: var(--white); border-color: var(--orange); }
    .ads-tab:hover:not(.active) { border-color: var(--orange); color: var(--orange); }

    /* Ad card — redesigned with bigger image, better badge alignment, horizontal actions */
    .ad-card {
      display: grid;
      grid-template-columns: 180px 1fr;
      gap: 20px;
      padding: 16px;
      border: 1.5px solid var(--border);
      border-radius: 14px;
      margin-bottom: 14px;
      transition: box-shadow 0.2s, border-color 0.2s;
    }
    .ad-card:hover { box-shadow: var(--shadow-hover); border-color: #DCDCDC; }
    @media (max-width: 700px) {
      .ad-card { grid-template-columns: 1fr; gap: 14px; }
    }
    .ad-card-img-wrap { position: relative; }
    .ad-card-img {
      width: 100%; height: 130px; border-radius: 10px; object-fit: cover;
      background: var(--light-grey); display: block;
    }
    @media (max-width: 700px) { .ad-card-img { height: 180px; } }
    .ad-card-body { display: flex; flex-direction: column; min-width: 0; }
    .ad-card-badges {
      display: flex; align-items: center; gap: 6px; flex-wrap: wrap; margin-bottom: 6px;
    }
    .ad-card-title {
      font-size: 16px; font-weight: 800; color: var(--dark);
      margin-bottom: 4px; line-height: 1.3;
      overflow: hidden; text-overflow: ellipsis;
    }
    .ad-card-price { font-size: 18px; font-weight: 900; color: var(--orange); margin-bottom: 10px; }
    .ad-card-meta { display: flex; gap: 14px; flex-wrap: wrap; margin-bottom: 14px; }
    .ad-meta-item { font-size: 12px; color: var(--grey); display: flex; align-items: center; gap: 5px; }
    .ad-meta-item svg { width: 13px; height: 13px; flex-shrink: 0; }
    .ad-status-badge {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 20px;
      line-height: 1;
    }
    .ad-status-badge.active     { background: #E8F5E9; color: #2E7D32; }
    .ad-status-badge.expired    { background: #FFEBEE; color: #C62828; }
    .ad-status-badge.pending    { background: #FFF8E1; color: #F57F17; }
    .ad-status-badge.sold       { background: #ECEFF1; color: #455A64; }
    .ad-status-badge.rejected   { background: #FFEBEE; color: #C62828; }
    .ad-status-badge::before {
      content: ''; display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: currentColor; opacity: 0.85;
    }
    .verified-ai-badge {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: 10px; font-weight: 700; padding: 3px 10px; border-radius: 20px;
      background: linear-gradient(135deg, #667eea, #764ba2); color: #fff;
      line-height: 1;
    }
    /* Action row at bottom of card body — horizontal, even spacing */
    .ad-card-actions {
      display: flex; gap: 8px; flex-wrap: wrap; margin-top: auto; padding-top: 4px;
    }
    .btn-ad-action {
      padding: 8px 16px; border-radius: 8px; font-size: 12px; font-weight: 700;
      cursor: pointer; border: 1.5px solid var(--border); background: var(--white);
      color: var(--dark); transition: all 0.15s; white-space: nowrap;
    }
    .btn-ad-action:hover { border-color: var(--orange); color: var(--orange); }
    .btn-ad-action.danger:hover { border-color: #E53935; color: #E53935; }
    .btn-ad-action.primary { background: var(--orange); color: var(--white); border-color: var(--orange); }
    .btn-ad-action.primary:hover { background: var(--orange-hover); }

    .empty-state { text-align: center; padding: 60px 20px; }
    .empty-state-icon { font-size: 48px; margin-bottom: 16px; }
    .empty-state-title { font-size: 20px; font-weight: 800; color: var(--dark); margin-bottom: 8px; }
    .empty-state-sub { font-size: 14px; color: var(--grey); margin-bottom: 24px; }
    .btn-place-ad-cta { background: var(--orange); color: var(--white); border: none; border-radius: 10px; padding: 13px 28px; font-size: 15px; font-weight: 800; cursor: pointer; }
    /* Toast styles defined globally in style.css */
  </style>
</head>
<body>
  <div id="navbar-placeholder"></div>

  <div class="container">
    <div class="dashboard-layout">

      <!-- Sidebar -->
      <aside class="dash-sidebar">
        <div class="dash-profile-card">
          <div class="dash-avatar"></div>
          <div class="dash-name"></div>
          <div class="dash-email"></div>
          <div class="dash-verified-badge" id="sidebar-verified-badge">
            <svg viewBox="0 0 16 16" width="12" fill="none"><path d="M8 1l1.8 2.6L13 4.5l-2.1 2.4.3 3.1L8 8.7l-3.2 1.3.3-3.1L3 4.5l3.2-.9L8 1z" fill="#2E7D32"/></svg>
            Verified
          </div>
          <div class="dash-stats">
            <div class="dash-stat"><div class="dash-stat-num">0</div><div class="dash-stat-label">Active Ads</div></div>
            <div class="dash-stat"><div class="dash-stat-num">0</div><div class="dash-stat-label">Saved</div></div>
          </div>
        </div>
                <nav class="dash-nav">
          <a href="profile.html" class="dash-nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>My Profile</a>
          <a href="my-ads.html" class="dash-nav-item active"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="3"/><path d="M3 9h18M9 21V9"/></svg>My Ads<span class="dash-nav-badge" style="display:none;">0</span></a>
          <a href="favourites.html" class="dash-nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>Favourites<span class="dash-nav-badge" style="background:#E53935;display:none;">0</span></a>
          <a href="saved-searches.html" class="dash-nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.35-4.35"/></svg>Saved Searches<span class="dash-nav-badge" style="background:#2196F3;display:none;">0</span></a>
          <a href="alerts.html" class="dash-nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>Vehicle Alerts<span class="dash-nav-badge" style="background:#2196F3;display:none;">0</span></a>
          <a href="recent-searches.html" class="dash-nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.35-4.35"/></svg>Recent Searches</a>
          <a href="chats.html" class="dash-nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>Chats<span class="dash-nav-badge" id="nav-chats-count" style="display:none;">0</span></a>
          <a href="notifications.html" class="dash-nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>Notifications<span class="dash-nav-badge" style="display:none;">0</span></a>
          <a href="login.html" class="dash-nav-item" style="color:#E53935;margin-top:8px;border-top:1px solid var(--border);border-radius:0 0 10px 10px;padding-top:16px;"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>Log Out</a>
        </nav>
      </aside>

      <!-- Main -->
      <main class="dash-main">

        <!-- Stats -->
        <div class="ads-stats-bar">
          <div class="ads-stat-card orange">
            <div class="ads-stat-num" id="stat-active">0</div>
            <div class="ads-stat-label">Active Ads</div>
          </div>
          <div class="ads-stat-card blue">
            <div class="ads-stat-num" id="total-views">0</div>
            <div class="ads-stat-label">Total Views</div>
          </div>
          <div class="ads-stat-card green">
            <div class="ads-stat-num" id="total-inquiries">0</div>
            <div class="ads-stat-label">Total Inquiries</div>
          </div>
          <div class="ads-stat-card">
            <div class="ads-stat-num" id="stat-expired">0</div>
            <div class="ads-stat-label">Expired Ads</div>
          </div>
        </div>

        <!-- Ads List -->
        <div class="dash-card">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:12px;">
            <div>
              <div class="dash-card-title">My Listings</div>
              <div class="dash-card-sub" style="margin-bottom:0;">Manage all your active and past listings.</div>
            </div>
            <button class="btn-ad-action primary" onclick="window.location.href='place-ad.html'">+ New Listing</button>
          </div>

          <div class="ads-filter-tabs">
            <button class="ads-tab active" onclick="filterAds('all', this)">All (<span id="tab-count-all">0</span>)</button>
            <button class="ads-tab" onclick="filterAds('active', this)">Active (<span id="tab-count-active">0</span>)</button>
            <button class="ads-tab" onclick="filterAds('expired', this)">Expired (<span id="tab-count-expired">0</span>)</button>
          </div>

          <div id="ads-list"></div>
        </div>

      </main>
    </div>
  </div>

  <div id="footer-placeholder"></div>
  <div class="toast" id="toast"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.4/dist/umd/supabase.min.js" defer></script>
  <script src="supabase-client.js" defer></script>
  <script src="auth.js" defer></script>
  <script src="components.js"></script>
  <script src="auth-modal.js" defer></script>
  <script>

  // Auth guard: redirect to login if not signed in
  (async () => {
    let tries = 0;
    while (!window.Auth && tries < 50) { await new Promise(r => setTimeout(r, 50)); tries++; }
    if (!window.Auth) return;
    await window.Auth.requireAuth();
  })();
    renderNavbar('my-ads');
    renderFooter();

    let currentFilter = 'all';

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 3000);
    }

    let myAds = []; // populated from Supabase

    function filterAds(filter, btn) {
      currentFilter = filter;
      document.querySelectorAll('.ads-tab').forEach(t => t.classList.remove('active'));
      btn.classList.add('active');
      renderAds();
    }

    // Load the current user's listings from Supabase (with primary photo)
    async function loadMyAds() {
      let tries = 0;
      while (!window.Auth && tries < 50) { await new Promise(r => setTimeout(r, 50)); tries++; }
      if (!window.Auth) return;
      const user = await window.Auth.getUser();
      if (!user) return; // requireAuth above already redirects

      const { data, error } = await window.supa
        .from('listings')
        .select('id, title, price, status, view_count, location, created_at, listing_images(url, is_primary)')
        .eq('owner_id', user.id)
        .order('created_at', { ascending: false });

      if (error) {
        console.warn('[my-ads] failed to load:', error.message);
        myAds = [];
        renderAds();
        return;
      }
      myAds = (data || []).map(row => {
        const primary = (row.listing_images || []).find(i => i.is_primary) || (row.listing_images || [])[0];
        return {
          id: row.id,
          title: row.title,
          price: row.price,
          status: row.status,           // active | pending_review | sold | expired | rejected
          views: row.view_count || 0,
          inquiries: 0,                 // not yet tracked — TODO Phase 4
          img: primary ? primary.url : '',
          postedDate: row.created_at,
          location: row.location || '',
          verified: row.status === 'active',
        };
      });

      // Compute and show real stats in the header cards
      const activeCount  = myAds.filter(a => a.status === 'active').length;
      const expiredCount = myAds.filter(a => a.status === 'expired' || a.status === 'sold').length;
      const totalViews   = myAds.reduce((s, a) => s + (a.views || 0), 0);
      const totalInq     = myAds.reduce((s, a) => s + (a.inquiries || 0), 0);
      const setNum = (id, val) => { const el = document.getElementById(id); if (el) el.textContent = val.toLocaleString(); };
      setNum('stat-active', activeCount);
      setNum('total-views', totalViews);
      setNum('total-inquiries', totalInq);
      setNum('stat-expired', expiredCount);
      // Tab counts
      setNum('tab-count-all', myAds.length);
      setNum('tab-count-active', activeCount);
      setNum('tab-count-expired', expiredCount);

      renderAds();
    }

    function statusLabel(s) {
      switch (s) {
        case 'active':         return 'Active';
        case 'pending_review': return 'Pending Review';
        case 'sold':           return 'Sold';
        case 'expired':        return 'Expired';
        case 'rejected':       return 'Rejected';
        default:               return s;
      }
    }

    function renderAds() {
      const list = document.getElementById('ads-list');
      const ads = currentFilter === 'all' ? myAds : myAds.filter(a => a.status === currentFilter);

      if (ads.length === 0) {
        list.innerHTML = `<div class="empty-state">
          <div class="empty-state-icon">📋</div>
          <div class="empty-state-title">No listings here</div>
          <div class="empty-state-sub">You have no ${currentFilter === 'all' ? '' : currentFilter} listings ${currentFilter === 'all' ? 'yet' : 'at the moment'}.</div>
          <button class="btn-place-ad-cta" onclick="window.location.href='place-ad.html'">+ Place Your First Ad</button>
        </div>`;
        return;
      }

      list.innerHTML = ads.map(ad => `
        <div class="ad-card" id="ad-${ad.id}">
          <div class="ad-card-img-wrap">
            <img class="ad-card-img" src="${ad.img}" alt="${ad.title}" loading="lazy" onerror="this.style.background='#eee'" />
          </div>
          <div class="ad-card-body">
            <div class="ad-card-badges">
              <span class="ad-status-badge ${ad.status}">${statusLabel(ad.status)}</span>
              ${ad.verified ? '<span class="verified-ai-badge">🤖 Verified by AI</span>' : ''}
            </div>
            <div class="ad-card-title">${ad.title}</div>
            <div class="ad-card-price">${dmFormatPrice(ad.price)}</div>
            <div class="ad-card-meta">
              <span class="ad-meta-item">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                ${ad.views.toLocaleString()} ${ad.views === 1 ? 'view' : 'views'}
              </span>
              <span class="ad-meta-item">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                ${ad.inquiries} ${ad.inquiries === 1 ? 'inquiry' : 'inquiries'}
              </span>
              <span class="ad-meta-item">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                Posted ${dmTimeAgo(ad.postedDate)}
              </span>
              ${ad.location ? `<span class="ad-meta-item">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
                ${ad.location}
              </span>` : ''}
            </div>
            <div class="ad-card-actions">
              <button class="btn-ad-action primary" onclick="window.location.href='listing.html?id=${ad.id}'">View</button>
              <button class="btn-ad-action" onclick="window.location.href='place-ad.html?edit=${ad.id}'">Edit</button>
              ${ad.status === 'active'
                ? `<button class="btn-ad-action" onclick="markSold('${ad.id}')">Mark Sold</button>`
                : ad.status === 'sold' || ad.status === 'expired'
                  ? `<button class="btn-ad-action primary" onclick="renewAd('${ad.id}', this)">Renew</button>`
                  : ''
              }
              <button class="btn-ad-action danger" onclick="deleteAd('${ad.id}')">Delete</button>
            </div>
          </div>
        </div>
      `).join('');
    }

    async function markSold(id) {
      if (!confirm('Mark this listing as sold? It will be hidden from public search.')) return;
      const { error } = await window.supa.from('listings').update({ status: 'sold' }).eq('id', id);
      if (error) { showToast('Could not update: ' + error.message); return; }
      showToast('Listing marked as sold.');
      loadMyAds();
    }

    async function renewAd(id, btn) {
      // No modal — just do it. Server function checks ownership and resets
      // status + expires_at + reminder flag in one atomic update.
      if (btn) { btn.disabled = true; const orig = btn.textContent; btn.textContent = 'Renewing…'; btn.dataset.orig = orig; }
      try {
        const { error } = await window.supa.rpc('renew_listing', { p_listing_id: id });
        if (error) throw error;
        showToast('Listing renewed — active for another 60 days.');
        loadMyAds();
      } catch (e) {
        if (btn) { btn.disabled = false; btn.textContent = btn.dataset.orig || 'Renew'; }
        showToast('Could not renew: ' + (e.message || ''));
      }
    }
    window.renewAd = renewAd;

    async function deleteAd(id) {
      if (!confirm('Are you sure you want to delete this listing? This cannot be undone.')) return;
      const { error } = await window.supa.from('listings').delete().eq('id', id);
      if (error) { showToast('Could not delete: ' + error.message); return; }
      showToast('Listing deleted.');
      loadMyAds();
    }

    // Load real ads on page ready
    loadMyAds();
