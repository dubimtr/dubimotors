<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chats — DUBIMOTORS</title>
  <link rel="stylesheet" href="style.css" />
  <script src="user-common.js"></script>
  <style>
    body { background: var(--light-grey); }
    .dashboard-layout { display: grid; grid-template-columns: 260px 1fr; gap: 28px; padding: 36px 0 60px; }
    @media (max-width: 860px) { .dashboard-layout { grid-template-columns: 1fr; } .dash-sidebar { display: none; } }
    .dash-sidebar { display: flex; flex-direction: column; gap: 8px; }
    .dash-profile-card { background: var(--white); border-radius: 16px; padding: 24px; text-align: center; box-shadow: var(--shadow); margin-bottom: 8px; }
    .dash-avatar { width: 72px; height: 72px; border-radius: 50%; background: var(--orange); color: var(--white); font-size: 26px; font-weight: 800; display: flex; align-items: center; justify-content: center; margin: 0 auto 12px; }
    .dash-name { font-size: 16px; font-weight: 800; color: var(--dark); }
    .dash-email { font-size: 12px; color: var(--grey); margin-top: 2px; }
    .dash-verified-badge { display: inline-flex; align-items: center; gap: 4px; background: #E8F5E9; color: #2E7D32; font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 20px; margin-top: 8px; }
    .dash-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 16px; }
    .dash-stat { background: var(--light-grey); border-radius: 10px; padding: 10px; text-align: center; }
    .dash-stat-num { font-size: 20px; font-weight: 900; color: var(--dark); }
    .dash-stat-label { font-size: 10px; color: var(--grey); font-weight: 600; margin-top: 2px; }
    .dash-nav { background: var(--white); border-radius: 16px; padding: 8px; box-shadow: var(--shadow); }
    .dash-nav-item { display: flex; align-items: center; gap: 12px; padding: 12px 14px; border-radius: 10px; font-size: 14px; font-weight: 600; color: var(--dark); cursor: pointer; text-decoration: none; transition: background 0.15s; }
    .dash-nav-item:hover { background: var(--light-grey); }
    .dash-nav-item.active { background: #FFF0EB; color: var(--orange); }
    .dash-nav-item svg { width: 18px; height: 18px; flex-shrink: 0; }
    .dash-nav-badge { margin-left: auto; background: var(--orange); color: var(--white); font-size: 10px; font-weight: 800; padding: 2px 7px; border-radius: 20px; }

    /* Chat layout */
    .chat-container { background: var(--white); border-radius: 16px; box-shadow: var(--shadow); overflow: hidden; display: grid; grid-template-columns: 300px 1fr; min-height: 600px; }
    @media (max-width: 700px) { .chat-container { grid-template-columns: 1fr; } .chat-panel { display: none; } .chat-panel.active { display: flex; } }

    /* Chat list */
    .chat-list { border-right: 1px solid var(--border); display: flex; flex-direction: column; }
    .chat-list-header { padding: 20px; border-bottom: 1px solid var(--border); }
    .chat-list-title { font-size: 16px; font-weight: 800; color: var(--dark); }
    .chat-list-sub { font-size: 12px; color: var(--grey); margin-top: 2px; }
    .chat-item { display: flex; align-items: center; gap: 12px; padding: 14px 16px; cursor: pointer; border-bottom: 1px solid var(--border); transition: background 0.15s; }
    .chat-item:hover { background: var(--light-grey); }
    .chat-item.active { background: #FFF0EB; }
    .chat-item-avatar { width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 15px; font-weight: 800; color: var(--white); flex-shrink: 0; }
    .chat-item-body { flex: 1; min-width: 0; }
    .chat-item-name { font-size: 14px; font-weight: 700; color: var(--dark); }
    .chat-item-preview { font-size: 12px; color: var(--grey); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 2px; }
    .chat-item-meta { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; flex-shrink: 0; }
    .chat-item-time { font-size: 11px; color: var(--grey); }
    .chat-unread { background: var(--orange); color: var(--white); font-size: 10px; font-weight: 800; width: 18px; height: 18px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }

    /* Chat panel */
    .chat-panel { display: flex; flex-direction: column; }
    .chat-header { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; }
    .chat-header-avatar { width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 800; color: var(--white); flex-shrink: 0; }
    .chat-header-name { font-size: 15px; font-weight: 800; color: var(--dark); }
    .chat-header-listing { font-size: 12px; color: var(--grey); }
    .chat-listing-bar { padding: 10px 20px; background: #FFF8F6; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; }
    .chat-listing-img { width: 40px; height: 30px; border-radius: 6px; object-fit: cover; }
    .chat-listing-title { font-size: 12px; font-weight: 700; color: var(--dark); }
    .chat-listing-price { font-size: 12px; color: var(--orange); font-weight: 700; }

    .chat-messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; background: #FAFAFA; }
    .msg { display: flex; gap: 8px; max-width: 75%; }
    .msg.me { align-self: flex-end; flex-direction: row-reverse; }
    .msg-avatar { width: 32px; height: 32px; border-radius: 50%; background: var(--light-grey); display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 800; flex-shrink: 0; }
    .msg-bubble { padding: 10px 14px; border-radius: 16px; font-size: 14px; line-height: 1.5; }
    .msg.them .msg-bubble { background: var(--white); border: 1px solid var(--border); color: var(--dark); border-radius: 4px 16px 16px 16px; }
    .msg.me .msg-bubble { background: var(--orange); color: var(--white); border-radius: 16px 4px 16px 16px; }
    .msg-time { font-size: 10px; color: var(--grey); margin-top: 4px; text-align: right; }
    .msg.them .msg-time { text-align: left; }

    .chat-input-area { padding: 16px 20px; border-top: 1px solid var(--border); display: flex; gap: 10px; align-items: center; }
    .chat-input { flex: 1; border: 1.5px solid var(--border); border-radius: 24px; padding: 10px 18px; font-size: 14px; outline: none; transition: border-color 0.2s; }
    .chat-input:focus { border-color: var(--orange); }
    .btn-send { background: var(--orange); color: var(--white); border: none; border-radius: 50%; width: 42px; height: 42px; display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; transition: background 0.2s; }
    .btn-send:hover { background: var(--orange-hover); }
    .btn-send svg { width: 18px; height: 18px; }

    .chat-empty { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px; text-align: center; }
    .chat-empty-icon { font-size: 48px; margin-bottom: 16px; }
    .chat-empty-title { font-size: 18px; font-weight: 800; color: var(--dark); margin-bottom: 8px; }
    .chat-empty-sub { font-size: 14px; color: var(--grey); }

    .toast { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%); background: var(--dark); color: var(--white); padding: 12px 24px; border-radius: 30px; font-size: 14px; font-weight: 600; z-index: 9999; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
    .toast.show { opacity: 1; }
  </style>
</head>
<body>
  <div id="navbar-placeholder"></div>

  <div class="container">
    <div class="dashboard-layout">
      <aside class="dash-sidebar">
        <div class="dash-profile-card">
          <div class="dash-avatar">AR</div>
          <div class="dash-name">Ahmed Al Rashidi</div>
          <div class="dash-email">ahmed@example.com</div>
          <div class="dash-verified-badge"><svg viewBox="0 0 16 16" width="12" fill="none"><path d="M8 1l1.8 2.6L13 4.5l-2.1 2.4.3 3.1L8 8.7l-3.2 1.3.3-3.1L3 4.5l3.2-.9L8 1z" fill="#2E7D32"/></svg>Verified</div>
          <div class="dash-stats"><div class="dash-stat"><div class="dash-stat-num">3</div><div class="dash-stat-label">Active Ads</div></div><div class="dash-stat"><div class="dash-stat-num">3</div><div class="dash-stat-label">Saved</div></div></div>
        </div>
        <nav class="dash-nav">
          <a href="profile.html" class="dash-nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>My Profile</a>
          <a href="my-ads.html" class="dash-nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="3"/><path d="M3 9h18M9 21V9"/></svg>My Ads<span class="dash-nav-badge">3</span></a>
          <a href="saved-searches.html" class="dash-nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.35-4.35"/><path d="M11 8v6M8 11h6" stroke-linecap="round"/></svg>Saved Searches<span class="dash-nav-badge" style="background:#2196F3;">3</span></a>
          <a href="recent-searches.html" class="dash-nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.35-4.35"/></svg>Recent Searches</a>
          <a href="chats.html" class="dash-nav-item active"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>Chats<span class="dash-nav-badge">2</span></a>
          <a href="notifications.html" class="dash-nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>Notifications<span class="dash-nav-badge">5</span></a>
          <a href="login.html" class="dash-nav-item" style="color:#E53935;margin-top:8px;border-top:1px solid var(--border);border-radius:0 0 10px 10px;padding-top:16px;"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>Log Out</a>
        </nav>
      </aside>

      <main>
        <div class="chat-container">
          <!-- Chat list -->
          <div class="chat-list">
            <div class="chat-list-header">
              <div class="chat-list-title">Messages</div>
              <div class="chat-list-sub">3 conversations</div>
            </div>
            <div id="chat-list-items"></div>
          </div>

          <!-- Chat panel -->
          <div class="chat-panel" id="chat-panel">
            <div class="chat-empty">
              <div class="chat-empty-icon">💬</div>
              <div class="chat-empty-title">Select a conversation</div>
              <div class="chat-empty-sub">Choose a chat from the left to start messaging.</div>
            </div>
          </div>
        </div>
      </main>
    </div>
  </div>

  <div id="footer-placeholder"></div>
  <div class="toast" id="toast"></div>

  <script src="components.js"></script>
  <script>
    renderNavbar('chats');
    renderFooter();

    let activeChat = null;

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 3000);
    }

    function renderChatList() {
      const list = document.getElementById('chat-list-items');
      list.innerHTML = DM_CHATS.map(chat => `
        <div class="chat-item ${activeChat === chat.id ? 'active' : ''}" onclick="openChat('${chat.id}')">
          <div class="chat-item-avatar" style="background:${chat.avatarColor}">${chat.initials}</div>
          <div class="chat-item-body">
            <div class="chat-item-name">${chat.with}</div>
            <div class="chat-item-preview">${chat.lastMessage}</div>
          </div>
          <div class="chat-item-meta">
            <span class="chat-item-time">${chat.time}</span>
            ${chat.unread > 0 ? `<span class="chat-unread">${chat.unread}</span>` : ''}
          </div>
        </div>
      `).join('');
    }

    function openChat(id) {
      activeChat = id;
      const chat = DM_CHATS.find(c => c.id === id);
      if (!chat) return;
      chat.unread = 0;
      renderChatList();

      const panel = document.getElementById('chat-panel');
      panel.innerHTML = `
        <div class="chat-header">
          <div class="chat-header-avatar" style="background:${chat.avatarColor}">${chat.initials}</div>
          <div>
            <div class="chat-header-name">${chat.with}</div>
            <div class="chat-header-listing">Re: ${chat.listing}</div>
          </div>
        </div>
        <div class="chat-listing-bar">
          <img class="chat-listing-img" src="${chat.listingImg}" alt="${chat.listing}" />
          <div>
            <div class="chat-listing-title">${chat.listing}</div>
          </div>
        </div>
        <div class="chat-messages" id="messages-${id}">
          ${chat.messages.map(m => `
            <div class="msg ${m.from}">
              <div class="msg-avatar" style="background:${m.from === 'me' ? 'var(--orange)' : chat.avatarColor};color:#fff;">
                ${m.from === 'me' ? 'AR' : chat.initials}
              </div>
              <div>
                <div class="msg-bubble">${m.text}</div>
                <div class="msg-time">${m.time}</div>
              </div>
            </div>
          `).join('')}
        </div>
        <div class="chat-input-area">
          <input class="chat-input" id="chat-input-${id}" placeholder="Type a message..." onkeydown="if(event.key==='Enter') sendMessage('${id}')" />
          <button class="btn-send" onclick="sendMessage('${id}')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
          </button>
        </div>
      `;

      // Scroll to bottom
      const msgs = document.getElementById('messages-' + id);
      if (msgs) msgs.scrollTop = msgs.scrollHeight;
    }

    function sendMessage(chatId) {
      const input = document.getElementById('chat-input-' + chatId);
      const text = input.value.trim();
      if (!text) return;

      const chat = DM_CHATS.find(c => c.id === chatId);
      if (!chat) return;

      const now = new Date();
      const timeStr = now.getHours() + ':' + String(now.getMinutes()).padStart(2, '0') + ' ' + (now.getHours() >= 12 ? 'PM' : 'AM');
      chat.messages.push({ from: 'me', text, time: timeStr });
      chat.lastMessage = text;
      input.value = '';

      const msgs = document.getElementById('messages-' + chatId);
      const newMsg = document.createElement('div');
      newMsg.className = 'msg me';
      newMsg.innerHTML = `
        <div class="msg-avatar" style="background:var(--orange);color:#fff;">AR</div>
        <div>
          <div class="msg-bubble">${text}</div>
          <div class="msg-time">${timeStr}</div>
        </div>
      `;
      msgs.appendChild(newMsg);
      msgs.scrollTop = msgs.scrollHeight;
      renderChatList();
    }

    renderChatList();
  </script>
</body>
</html>
