<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Saved Searches — DUBIMOTORS</title>
  <link rel="stylesheet" href="style.css" />
  <script src="user-common.js"></script>
  <style>
    body { background: var(--light-grey); }
    .dashboard-layout { display: grid; grid-template-columns: 260px 1fr; gap: 28px; padding: 36px 0 60px; }
    @media (max-width: 860px) { .dashboard-layout { grid-template-columns: 1fr; } .dash-sidebar { display: none; } }
    .dash-sidebar { display: flex; flex-direction: column; gap: 8px; }
    .dash-profile-card { background: var(--white); border-radius: 16px; padding: 24px; text-align: center; box-shadow: var(--shadow); margin-bottom: 8px; }
    .dash-avatar { width: 72px; height: 72px; border-radius: 50%; background: var(--orange); color: var(--white); font-size: 26px; font-weight: 800; display: flex; align-items: center; justify-content: center; margin: 0 auto 12px; }
    .dash-name { font-size: 16px; font-weight: 800; color: var(--dark); }
    .dash-email { font-size: 12px; color: var(--grey); margin-top: 2px; }
    .dash-verified-badge { display: inline-flex; align-items: center; gap: 4px; background: #E8F5E9; color: #2E7D32; font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 20px; margin-top: 8px; }
    .dash-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 16px; }
    .dash-stat { background: var(--light-grey); border-radius: 10px; padding: 10px; text-align: center; }
    .dash-stat-num { font-size: 20px; font-weight: 900; color: var(--dark); }
    .dash-stat-label { font-size: 10px; color: var(--grey); font-weight: 600; margin-top: 2px; }
    .dash-nav { background: var(--white); border-radius: 16px; padding: 8px; box-shadow: var(--shadow); }
    .dash-nav-item { display: flex; align-items: center; gap: 12px; padding: 12px 14px; border-radius: 10px; font-size: 14px; font-weight: 600; color: var(--dark); cursor: pointer; text-decoration: none; transition: background 0.15s; }
    .dash-nav-item:hover { background: var(--light-grey); }
    .dash-nav-item.active { background: #FFF0EB; color: var(--orange); }
    .dash-nav-item svg { width: 18px; height: 18px; flex-shrink: 0; }
    .dash-nav-badge { margin-left: auto; background: var(--orange); color: var(--white); font-size: 10px; font-weight: 800; padding: 2px 7px; border-radius: 20px; }
    .dash-main { display: flex; flex-direction: column; gap: 24px; }
    .dash-card { background: var(--white); border-radius: 16px; padding: 28px; box-shadow: var(--shadow); }
    .dash-card-title { font-size: 18px; font-weight: 800; color: var(--dark); margin-bottom: 4px; }
    .dash-card-sub { font-size: 13px; color: var(--grey); margin-bottom: 24px; }

    /* Saved search card */
    .ss-card { border: 1.5px solid var(--border); border-radius: 14px; padding: 20px; margin-bottom: 12px; display: flex; align-items: center; gap: 16px; transition: box-shadow 0.2s; }
    .ss-card:hover { box-shadow: var(--shadow-hover); }
    .ss-icon { width: 48px; height: 48px; border-radius: 12px; background: #EBF5FF; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .ss-icon svg { width: 22px; height: 22px; color: #2196F3; stroke: #2196F3; }
    .ss-body { flex: 1; min-width: 0; }
    .ss-label { font-size: 15px; font-weight: 800; color: var(--dark); margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .ss-filters { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 8px; }
    .ss-filter-pill { background: var(--light-grey); border-radius: 20px; padding: 3px 10px; font-size: 11px; font-weight: 600; color: var(--grey); }
    .ss-meta { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
    .ss-new-badge { background: #E8F5E9; color: #2E7D32; font-size: 11px; font-weight: 800; padding: 3px 10px; border-radius: 20px; }
    .ss-date { font-size: 12px; color: var(--grey); }
    .ss-actions { display: flex; flex-direction: column; gap: 8px; align-items: flex-end; flex-shrink: 0; }
    .btn-ss { padding: 8px 16px; border-radius: 8px; font-size: 12px; font-weight: 700; cursor: pointer; border: 1.5px solid var(--border); background: var(--white); color: var(--dark); transition: all 0.15s; white-space: nowrap; }
    .btn-ss:hover { border-color: var(--orange); color: var(--orange); }
    .btn-ss.primary { background: var(--orange); color: var(--white); border-color: var(--orange); }
    .btn-ss.primary:hover { background: var(--orange-hover); }
    .btn-ss.danger:hover { border-color: #E53935; color: #E53935; }
    .alert-toggle { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--grey); font-weight: 600; cursor: pointer; }
    .alert-toggle input { accent-color: var(--orange); width: 15px; height: 15px; }

    .empty-state { text-align: center; padding: 60px 20px; }
    .empty-state-icon { font-size: 48px; margin-bottom: 16px; }
    .empty-state-title { font-size: 20px; font-weight: 800; color: var(--dark); margin-bottom: 8px; }
    .empty-state-sub { font-size: 14px; color: var(--grey); }

    .toast { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%); background: var(--dark); color: var(--white); padding: 12px 24px; border-radius: 30px; font-size: 14px; font-weight: 600; z-index: 9999; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
    .toast.show { opacity: 1; }
  </style>
</head>
<body>
  <div id="navbar-placeholder"></div>

  <div class="container">
    <div class="dashboard-layout">
      <aside class="dash-sidebar">
        <div class="dash-profile-card">
          <div class="dash-avatar">AR</div>
          <div class="dash-name">Ahmed Al Rashidi</div>
          <div class="dash-email">ahmed@example.com</div>
          <div class="dash-verified-badge"><svg viewBox="0 0 16 16" width="12" fill="none"><path d="M8 1l1.8 2.6L13 4.5l-2.1 2.4.3 3.1L8 8.7l-3.2 1.3.3-3.1L3 4.5l3.2-.9L8 1z" fill="#2E7D32"/></svg>Verified</div>
          <div class="dash-stats"><div class="dash-stat"><div class="dash-stat-num">3</div><div class="dash-stat-label">Active Ads</div></div><div class="dash-stat"><div class="dash-stat-num">3</div><div class="dash-stat-label">Saved</div></div></div>
        </div>
        <nav class="dash-nav">
          <a href="profile.html" class="dash-nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>My Profile</a>
          <a href="my-ads.html" class="dash-nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="3"/><path d="M3 9h18M9 21V9"/></svg>My Ads<span class="dash-nav-badge">3</span></a>
          <a href="saved-searches.html" class="dash-nav-item active"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.35-4.35"/><path d="M11 8v6M8 11h6" stroke-linecap="round"/></svg>Saved Searches<span class="dash-nav-badge" style="background:#2196F3;">3</span></a>
          <a href="recent-searches.html" class="dash-nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.35-4.35"/></svg>Recent Searches</a>
          <a href="chats.html" class="dash-nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>Chats<span class="dash-nav-badge">2</span></a>
          <a href="notifications.html" class="dash-nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>Notifications<span class="dash-nav-badge">5</span></a>
          <a href="login.html" class="dash-nav-item" style="color:#E53935;margin-top:8px;border-top:1px solid var(--border);border-radius:0 0 10px 10px;padding-top:16px;"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>Log Out</a>
        </nav>
      </aside>

      <main class="dash-main">
        <div class="dash-card">
          <div class="dash-card-title">Saved Searches</div>
          <div class="dash-card-sub">Get notified when new listings match your saved search criteria.</div>
          <div id="ss-list"></div>
        </div>
      </main>
    </div>
  </div>

  <div id="footer-placeholder"></div>
  <div class="toast" id="toast"></div>

  <script src="components.js"></script>
  <script>
    renderNavbar('saved-searches');
    renderFooter();

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 3000);
    }

    function renderSavedSearches() {
      const list = document.getElementById('ss-list');
      if (!DM_SAVED_SEARCHES.length) {
        list.innerHTML = `<div class="empty-state"><div class="empty-state-icon">🔍</div><div class="empty-state-title">No saved searches yet</div><div class="empty-state-sub">When you save a search, it will appear here and alert you to new matches.</div></div>`;
        return;
      }
      list.innerHTML = DM_SAVED_SEARCHES.map(ss => {
        const pills = Object.entries(ss.filters).map(([k, v]) => `<span class="ss-filter-pill">${v}</span>`).join('');
        return `
        <div class="ss-card" id="ss-${ss.id}">
          <div class="ss-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.35-4.35"/></svg></div>
          <div class="ss-body">
            <div class="ss-label">${ss.label}</div>
            <div class="ss-filters">${pills}</div>
            <div class="ss-meta">
              ${ss.newResults > 0 ? `<span class="ss-new-badge">+${ss.newResults} new results</span>` : '<span class="ss-date" style="color:#aaa;">No new results</span>'}
              <span class="ss-date">Saved ${dmTimeAgo(ss.savedDate)}</span>
              <label class="alert-toggle">
                <input type="checkbox" ${ss.alertEnabled ? 'checked' : ''} onchange="toggleAlert('${ss.id}', this.checked)" />
                Email alerts
              </label>
            </div>
          </div>
          <div class="ss-actions">
            <a href="${ss.url}" class="btn-ss primary">View Results</a>
            <button class="btn-ss danger" onclick="deleteSearch('${ss.id}')">Delete</button>
          </div>
        </div>`;
      }).join('');
    }

    function toggleAlert(id, enabled) {
      showToast(enabled ? 'Email alerts enabled for this search.' : 'Email alerts disabled.');
    }

    function deleteSearch(id) {
      const el = document.getElementById('ss-' + id);
      if (el) { el.style.opacity = '0.3'; el.style.pointerEvents = 'none'; }
      showToast('Saved search removed.');
    }

    renderSavedSearches();
  </script>
</body>
</html>
