<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Notifications — DUBIMOTORS</title>
    <!-- Font preconnect + stylesheet (loaded in parallel with style.css) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" />
  <link rel="stylesheet" href="style.css" />
  <script src="user-common.js"></script>
  <style>
    body { background: var(--light-grey); }
    .dashboard-layout { display: grid; grid-template-columns: 260px 1fr; gap: 28px; padding: 36px 0 60px; }
    @media (max-width: 860px) { .dashboard-layout { grid-template-columns: 1fr; } .dash-sidebar { display: none; } }
    .dash-sidebar { display: flex; flex-direction: column; gap: 8px; }
    .dash-profile-card { background: var(--white); border-radius: 16px; padding: 24px; text-align: center; box-shadow: var(--shadow); margin-bottom: 8px; }
    .dash-avatar { width: 72px; height: 72px; border-radius: 50%; background: var(--orange); color: var(--white); font-size: 26px; font-weight: 800; display: flex; align-items: center; justify-content: center; margin: 0 auto 12px; }
    .dash-name { font-size: 16px; font-weight: 800; color: var(--dark); }
    .dash-email { font-size: 12px; color: var(--grey); margin-top: 2px; }
    .dash-verified-badge { display: inline-flex; align-items: center; gap: 4px; background: #E8F5E9; color: #2E7D32; font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 20px; margin-top: 8px; }
    .dash-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 16px; }
    .dash-stat { background: var(--light-grey); border-radius: 10px; padding: 10px; text-align: center; }
    .dash-stat-num { font-size: 20px; font-weight: 900; color: var(--dark); }
    .dash-stat-label { font-size: 10px; color: var(--grey); font-weight: 600; margin-top: 2px; }
    .dash-nav { background: var(--white); border-radius: 16px; padding: 8px; box-shadow: var(--shadow); }
    .dash-nav-item { display: flex; align-items: center; gap: 12px; padding: 12px 14px; border-radius: 10px; font-size: 14px; font-weight: 600; color: var(--dark); cursor: pointer; text-decoration: none; transition: background 0.15s; }
    .dash-nav-item:hover { background: var(--light-grey); }
    .dash-nav-item.active { background: #FFF0EB; color: var(--orange); }
    .dash-nav-item svg { width: 18px; height: 18px; flex-shrink: 0; }
    .dash-nav-badge { margin-left: auto; background: var(--orange); color: var(--white); font-size: 10px; font-weight: 800; padding: 2px 7px; border-radius: 20px; }
    .dash-main { display: flex; flex-direction: column; gap: 24px; }
    .dash-card { background: var(--white); border-radius: 16px; padding: 28px; box-shadow: var(--shadow); }
    .dash-card-title { font-size: 18px; font-weight: 800; color: var(--dark); margin-bottom: 4px; }
    .dash-card-sub { font-size: 13px; color: var(--grey); margin-bottom: 24px; }

    /* Notification item */
    .notif-item { display: flex; align-items: flex-start; gap: 14px; padding: 16px 0; border-bottom: 1px solid var(--border); cursor: pointer; transition: background 0.15s; border-radius: 8px; }
    .notif-item:last-child { border-bottom: none; }
    .notif-item.unread { background: #FFFAF8; margin: 0 -8px; padding: 16px 8px; }
    .notif-item:hover { background: var(--light-grey); margin: 0 -8px; padding: 16px 8px; }
    .notif-icon { width: 44px; height: 44px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
    .notif-body { flex: 1; min-width: 0; }
    .notif-title { font-size: 14px; font-weight: 700; color: var(--dark); margin-bottom: 3px; }
    .notif-text { font-size: 13px; color: var(--grey); line-height: 1.5; }
    .notif-time { font-size: 11px; color: var(--grey); margin-top: 5px; }
    .notif-unread-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--orange); flex-shrink: 0; margin-top: 6px; }

    .notif-filter-tabs { display: flex; gap: 8px; margin-bottom: 20px; }
    .notif-tab { padding: 8px 18px; border-radius: 20px; font-size: 13px; font-weight: 700; border: 1.5px solid var(--border); background: var(--white); color: var(--grey); cursor: pointer; transition: all 0.15s; }
    .notif-tab.active { background: var(--orange); color: var(--white); border-color: var(--orange); }
    .notif-tab:hover:not(.active) { border-color: var(--orange); color: var(--orange); }

    .btn-mark-all { background: none; border: none; color: var(--orange); font-size: 13px; font-weight: 700; cursor: pointer; }
    .btn-mark-all:hover { text-decoration: underline; }

    /* Toast styles are defined globally in style.css — do NOT redefine here. */
  </style>
</head>
<body>
  <div id="navbar-placeholder"></div>

  <div class="container">
    <div class="dashboard-layout">
      <aside class="dash-sidebar">
        <div class="dash-profile-card">
          <div class="dash-avatar"></div>
          <div class="dash-name"></div>
          <div class="dash-email"></div>
          <div class="dash-verified-badge" id="sidebar-verified-badge"><svg viewBox="0 0 16 16" width="12" fill="none"><path d="M8 1l1.8 2.6L13 4.5l-2.1 2.4.3 3.1L8 8.7l-3.2 1.3.3-3.1L3 4.5l3.2-.9L8 1z" fill="#2E7D32"/></svg>Verified</div>
          <div class="dash-stats"><div class="dash-stat"><div class="dash-stat-num">0</div><div class="dash-stat-label">Active Ads</div></div><div class="dash-stat"><div class="dash-stat-num">0</div><div class="dash-stat-label">Saved</div></div></div>
        </div>
        <nav class="dash-nav">
          <a href="profile.html" class="dash-nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>My Profile</a>
          <a href="my-ads.html" class="dash-nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="3"/><path d="M3 9h18M9 21V9"/></svg>My Ads<span class="dash-nav-badge" style="display:none;">0</span></a>
          <a href="favourites.html" class="dash-nav-item">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
            Favourites
            <span class="dash-nav-badge" style="background:#E53935;display:none;">0</span>
          </a>
          <a href="saved-searches.html" class="dash-nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.35-4.35"/><path d="M11 8v6M8 11h6" stroke-linecap="round"/></svg>Vehicle Alerts<span class="dash-nav-badge" style="background:#2196F3;display:none;">0</span></a>
          <a href="recent-searches.html" class="dash-nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.35-4.35"/></svg>Recent Searches</a>
          <a href="chats.html" class="dash-nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>Chats<span class="dash-nav-badge" style="display:none;">0</span></a>
          <a href="notifications.html" class="dash-nav-item active"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>Notifications<span class="dash-nav-badge" style="display:none;">0</span></a>
          <a href="login.html" class="dash-nav-item" style="color:#E53935;margin-top:8px;border-top:1px solid var(--border);border-radius:0 0 10px 10px;padding-top:16px;"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>Log Out</a>
        </nav>
      </aside>

      <main class="dash-main">
        <div class="dash-card">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:10px;">
            <div>
              <div class="dash-card-title">Notifications</div>
              <div class="dash-card-sub" id="notif-subtitle" style="margin-bottom:0;">&nbsp;</div>
            </div>
            <button class="btn-mark-all" id="btn-mark-all" onclick="markAllRead()" style="display:none;">Mark all as read</button>
          </div>

          <div class="notif-filter-tabs" id="notif-tabs" style="display:none;">
            <button class="notif-tab active" onclick="filterNotifs('all', this)">All <span id="tab-count-all">0</span></button>
            <button class="notif-tab" onclick="filterNotifs('unread', this)">Unread <span id="tab-count-unread">0</span></button>
          </div>

          <div id="notif-list"></div>
        </div>
      </main>
    </div>
  </div>

  <div id="footer-placeholder"></div>
  <div class="toast" id="toast"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.4/dist/umd/supabase.min.js" defer></script>
  <script src="supabase-client.js" defer></script>
  <script src="auth.js" defer></script>
  <script src="components.js"></script>
  <script src="auth-modal.js" defer></script>
  <script>

  // Auth guard: redirect to login if not signed in
  (async () => {
    let tries = 0;
    while (!window.Auth && tries < 50) { await new Promise(r => setTimeout(r, 50)); tries++; }
    if (!window.Auth) return;
    await window.Auth.requireAuth();
    loadNotifications();
  })();
    renderNavbar('notifications');
    renderFooter();

    let notifs = [];
    let currentFilter = 'all';

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 3000);
    }
    function escapeHtml(s) {
      return String(s == null ? '' : s)
        .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
        .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
    }
    function timeAgo(ts) {
      const diff = Date.now() - new Date(ts).getTime();
      const m = Math.floor(diff / 60000);
      if (m < 1) return 'just now';
      if (m < 60) return m + ' min ago';
      const h = Math.floor(m / 60);
      if (h < 24) return h + ' hour' + (h !== 1 ? 's' : '') + ' ago';
      const d = Math.floor(h / 24);
      if (d < 7) return d + ' day' + (d !== 1 ? 's' : '') + ' ago';
      return new Date(ts).toLocaleDateString();
    }

    const TYPE_ICONS = {
      inquiry:           { icon: '💬', color: '#2196F3' },
      listing_approved:  { icon: '✅', color: '#4CAF50' },
      listing_rejected:  { icon: '⚠️', color: '#F57C00' },
      saved_search:      { icon: '🔍', color: '#9C27B0' },
      price_drop:        { icon: '💰', color: '#FF9800' },
      expiry_reminder:   { icon: '⏰', color: '#E91E63' },
      system:            { icon: '🔔', color: '#666' },
    };

    async function loadNotifications() {
      const list = document.getElementById('notif-list');
      list.innerHTML = '<div style="text-align:center;padding:30px;color:var(--grey);font-size:13px;">Loading…</div>';

      const user = await window.Auth.getUser();
      if (!user) return;

      try {
        const { data, error } = await window.supa
          .from('notifications')
          .select('id, type, title, body, link_url, read_at, created_at')
          .eq('user_id', user.id)
          .order('created_at', { ascending: false })
          .limit(100);
        if (error) throw error;
        notifs = data || [];
        updateChrome();
        renderNotifs();
      } catch (e) {
        // Table not present yet, or some other issue — show empty state
        notifs = [];
        updateChrome();
        renderNotifs();
      }
    }

    function updateChrome() {
      const total = notifs.length;
      const unread = notifs.filter(n => !n.read_at).length;
      const sub = document.getElementById('notif-subtitle');
      const tabs = document.getElementById('notif-tabs');
      const markBtn = document.getElementById('btn-mark-all');
      const allCount = document.getElementById('tab-count-all');
      const unreadCount = document.getElementById('tab-count-unread');

      if (total === 0) {
        if (sub) sub.textContent = "You're all caught up — no notifications yet.";
        if (tabs) tabs.style.display = 'none';
        if (markBtn) markBtn.style.display = 'none';
      } else {
        if (sub) sub.textContent = unread === 0
          ? `${total} notification${total !== 1 ? 's' : ''}`
          : `${unread} unread notification${unread !== 1 ? 's' : ''}`;
        if (tabs) tabs.style.display = '';
        if (markBtn) markBtn.style.display = unread > 0 ? '' : 'none';
        if (allCount) allCount.textContent = `(${total})`;
        if (unreadCount) unreadCount.textContent = `(${unread})`;
      }
    }

    function filterNotifs(filter, btn) {
      currentFilter = filter;
      document.querySelectorAll('.notif-tab').forEach(t => t.classList.remove('active'));
      btn.classList.add('active');
      renderNotifs();
    }

    async function markAllRead() {
      const user = await window.Auth.getUser();
      if (!user) return;
      const ids = notifs.filter(n => !n.read_at).map(n => n.id);
      if (!ids.length) return;
      try {
        const { error } = await window.supa
          .from('notifications')
          .update({ read_at: new Date().toISOString() })
          .in('id', ids);
        if (error) throw error;
        notifs.forEach(n => { if (!n.read_at) n.read_at = new Date().toISOString(); });
        updateChrome();
        renderNotifs();
        if (typeof window.dmRefreshNavbarNotifications === 'function') window.dmRefreshNavbarNotifications();
        showToast('All marked as read.');
      } catch (e) {
        showToast('Could not update: ' + (e.message || ''));
      }
    }
    window.markAllRead = markAllRead;
    window.filterNotifs = filterNotifs;

    async function openNotif(id) {
      const n = notifs.find(x => x.id === id);
      if (!n) return;

      // Mark read first (regardless of where we go next)
      if (!n.read_at) {
        try {
          await window.supa.from('notifications').update({ read_at: new Date().toISOString() }).eq('id', id);
          n.read_at = new Date().toISOString();
          if (typeof window.dmRefreshNavbarNotifications === 'function') window.dmRefreshNavbarNotifications();
        } catch {}
      }

      // Chat-related notifications jump to the conversation thread — the
      // notification is only useful as a deep-link. Other types stay in place
      // (mark-read on click) per round 5 UX decision.
      if (n.type === 'inquiry' && n.link_url) {
        window.location.href = n.link_url;
        return;
      }

      // In-place: update row visual state, no navigation, no scroll jump
      const rowEl = document.getElementById('n-' + id);
      if (rowEl) rowEl.classList.remove('unread');
      updateChrome();
    }
    window.openNotif = openNotif;

    function renderNotifs() {
      const list = document.getElementById('notif-list');
      let filtered = notifs;
      if (currentFilter === 'unread') filtered = notifs.filter(n => !n.read_at);

      if (!filtered.length) {
        const msg = notifs.length === 0
          ? `You haven't received any notifications yet. We'll let you know when something happens.`
          : (currentFilter === 'unread' ? `You've read everything. Nothing unread.` : `No notifications match this filter.`);
        list.innerHTML = `<div style="text-align:center;padding:40px 20px;">
          <div style="font-size:40px;margin-bottom:12px;">🔔</div>
          <div style="font-size:18px;font-weight:800;color:var(--dark);margin-bottom:8px;">${notifs.length === 0 ? 'No notifications' : "You're all caught up"}</div>
          <div style="font-size:14px;color:var(--grey);max-width:380px;margin:0 auto;">${msg}</div>
        </div>`;
        return;
      }

      list.innerHTML = filtered.map(n => {
        const t = TYPE_ICONS[n.type] || TYPE_ICONS.system;
        const isUnread = !n.read_at;
        return `
        <div id="n-${n.id}" class="notif-item ${isUnread ? 'unread' : ''}" onclick="openNotif('${n.id}')">
          <div class="notif-icon" style="background:${t.color}22;">${t.icon}</div>
          <div class="notif-body">
            <div class="notif-title">${escapeHtml(n.title)}</div>
            ${n.body ? `<div class="notif-text">${escapeHtml(n.body)}</div>` : ''}
            <div class="notif-time">${timeAgo(n.created_at)}</div>
          </div>
          ${isUnread ? '<div class="notif-unread-dot"></div>' : ''}
        </div>`;
      }).join('');

      // If we arrived via #n-<id> from the navbar bell, scroll the matching
      // row into view and briefly highlight it.
      const hash = window.location.hash;
      if (hash && hash.startsWith('#n-')) {
        const targetId = hash.slice(1); // "n-<uuid>"
        const target = document.getElementById(targetId);
        if (target) {
          target.scrollIntoView({ behavior: 'smooth', block: 'center' });
          target.style.transition = 'box-shadow 0.4s';
          target.style.boxShadow = '0 0 0 3px var(--orange)';
          setTimeout(() => { target.style.boxShadow = ''; }, 1500);
        }
      }
    }

    // Fill the dashboard sidebar with real auth + listing data
    if (typeof dmFillDashboardSidebar === 'function') dmFillDashboardSidebar();

  </script>
</body>
</html>
